<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,#f5f3ff 0%,#ede9fe 100%);min-height:100vh;padding:15px 10px 80px}
.container{max-width:600px;margin:0 auto}
.admin-header{text-align:center;padding:15px 0;background:#fff;border-radius:18px;margin-bottom:20px;box-shadow:0 8px 24px rgba(124,58,237,0.08)}
.admin-header h1{color:#b91c1c;font-size:20px;font-weight:800}
.admin-header p{color:#666;font-size:14px;margin-top:5px}
.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 8px 24px rgba(124,58,237,0.08)}
.card-title{font-size:16px;font-weight:700;color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #eee}
.btn{display:block;width:100%;padding:12px 20px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;text-align:center;margin-top:10px}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,#28a745,#1e7e34)}
.btn-red{background:linear-gradient(135deg,#dc3545,#c82333)}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.btn-gray{background:#6b7280}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}
.stat-card{background:#fff;border-radius:12px;padding:15px;text-align:center;border:1px solid #e5e7eb}
.stat-num{font-size:32px;font-weight:700;color:#8b5cf6}
.stat-label{font-size:12px;color:#666;margin-top:5px}
.tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:15px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.tab.active{background:#fff;color:#8b5cf6}
.review-item{background:#f8f9fa;border-radius:12px;padding:15px;margin-bottom:15px}
.review-header{display:flex;justify-content:space-between;margin-bottom:10px}
.review-image{max-width:100%;border-radius:8px;margin:10px 0;cursor:pointer}
.review-actions{display:flex;gap:10px;margin-top:10px}
.editor-section{background:#fff;border-radius:18px;padding:20px;margin-bottom:20px;border:2px dashed #8b5cf6}
.editor-title{font-size:16px;font-weight:700;color:#4c1d95;margin-bottom:15px}
.editor-group{margin-bottom:15px}
.editor-label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:600}
.editor-input{width:100%;padding:10px;border:1px solid #ddd6fe;border-radius:8px;font-size:14px}
.editor-textarea{width:100%;min-height:80px;padding:10px;border:1px solid #ddd6fe;border-radius:8px;font-size:14px;resize:vertical}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9998;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;max-width:90%;max-height:85vh;overflow-y:auto;width:340px}
.modal-title{font-size:18px;font-weight:700;color:#333;margin-bottom:15px;text-align:center}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:15px 30px;border-radius:10px;z-index:10000;font-size:14px;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.login-box{background:#fff;border-radius:18px;padding:40px;max-width:320px;margin:100px auto;text-align:center;box-shadow:0 8px 24px rgba(124,58,237,0.15)}
.login-box h2{color:#4c1d95;margin-bottom:20px}
.login-input{width:100%;padding:12px 15px;border:2px solid #ddd6fe;border-radius:10px;font-size:16px;margin-bottom:15px;box-sizing:border-box}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.login-error{color:#dc3545;font-size:14px;margin-top:10px;display:none}
.nav{display:flex;gap:10px;margin-bottom:15px}
.nav-btn{flex:1;padding:10px;background:#f3f4f6;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.nav-btn.active{background:#8b5cf6;color:#fff}
.hidden{display:none}
.upload-preview{max-width:100%;border-radius:8px;margin:10px 0;text-align:center}
.upload-preview img{max-width:100%;border-radius:8px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div id="loginPage" class="container">
<div class="login-box">
<h2>🔐 管理后台</h2>
<input type="password" class="login-input" id="passwordInput" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter')login()">
<button class="login-btn" onclick="login()">登 录</button>
<div class="login-error" id="loginError">密码错误，请重试</div>
</div>
</div>

<div id="adminPage" class="container hidden">
<div class="admin-header">
<h1>📊 活动管理后台</h1>
<p id="syncStatus">📡 正在连接云端...</p>
</div>

<div class="nav">
<button class="nav-btn active" onclick="switchView('review')" id="navReview">📋 审核管理</button>
<button class="nav-btn" onclick="switchView('config')" id="navConfig">⚙️ 配置管理</button>
</div>

<div id="reviewView">
<div class="card">
<div class="card-title">📈 审核统计</div>
<div class="stat-grid">
<div class="stat-card"><div class="stat-num" id="statPending">0</div><div class="stat-label">待审核</div></div>
<div class="stat-card"><div class="stat-num" id="statPassed">0</div><div class="stat-label">已通过</div></div>
<div class="stat-card"><div class="stat-num" id="statRejected">0</div><div class="stat-label">已拒绝</div></div>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab('pending')" id="tabPending">待审核 (0)</div>
<div class="tab" onclick="switchTab('passed')">已通过</div>
<div class="tab" onclick="switchTab('rejected')">已拒绝</div>
</div>
<div id="reviewList"></div>
</div>
</div>

<div id="configView" class="hidden">
<div class="editor-section">
<div class="editor-title">🎨 活动配置</div>
<div class="editor-group"><label class="editor-label">活动标题</label><input type="text" class="editor-input" id="cfg_title"></div>
<div class="editor-group"><label class="editor-label">副标题</label><input type="text" class="editor-input" id="cfg_subtitle"></div>
<div class="editor-group"><label class="editor-label">任务一标题</label><input type="text" class="editor-input" id="cfg_t1_title"></div>
<div class="editor-group"><label class="editor-label">任务一描述</label><textarea class="editor-textarea" id="cfg_t1_desc"></textarea></div>
<div class="editor-group"><label class="editor-label">任务二标题</label><input type="text" class="editor-input" id="cfg_t2_title"></div>
<div class="editor-group"><label class="editor-label">任务二描述</label><textarea class="editor-textarea" id="cfg_t2_desc"></textarea></div>
<div class="editor-group"><label class="editor-label">任务三标题</label><input type="text" class="editor-input" id="cfg_t3_title"></div>
<div class="editor-group"><label class="editor-label">任务三描述</label><textarea class="editor-textarea" id="cfg_t3_desc"></textarea></div>
<button class="btn btn-green" onclick="saveConfig()">保存配置</button>
</div>

<div class="editor-section">
<div class="editor-title">🔑 AI审核关键词配置</div>
<div class="editor-group"><label class="editor-label">必须包含关键词（每行一个）</label><textarea class="editor-textarea" id="kw_required" style="min-height:80px;"></textarea></div>
<div class="editor-group"><label class="editor-label">敏感词（检测到直接拒绝）</label><textarea class="editor-textarea" id="kw_ban" style="min-height:80px;"></textarea></div>
<button class="btn btn-green" onclick="saveKeywords()">保存关键词</button>
</div>

<div class="editor-section">
<div class="editor-title">🎁 审核通过页面图片</div>
<div class="editor-group">
<label class="editor-label">上传用户审核通过后显示的图片</label>
<div id="currentImg" class="upload-preview" style="display:none;"></div>
<div style="border:2px dashed #ddd6fe;padding:20px;border-radius:8px;text-align:center;margin:10px 0;">
<div style="font-size:32px;margin-bottom:10px;">🖼️</div>
<input type="file" id="imgInput" accept="image/*" onchange="handleImg(this.files[0])" style="display:none;">
<button class="btn btn-purple" onclick="document.getElementById('imgInput').click()" style="margin:0;">上传图片</button>
</div>
<div id="imgPreview" class="upload-preview" style="display:none;"></div>
</div>
<div class="editor-group"><label class="editor-label">或输入图片URL</label><input type="text" class="editor-input" id="imgUrl" placeholder="图片链接"></div>
<button class="btn btn-green" onclick="saveImg()">保存到云端</button>
<button class="btn btn-gray" onclick="clearImg()" style="margin-top:10px;">清除图片</button>
</div>
</div>

<button class="btn btn-gray" onclick="logout()" style="margin-top:20px;">退出登录</button>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<div class="modal-title" id="modalTitle"></div>
<div id="modalBody"></div>
</div>
</div>

<script>
const SUPABASE_URL='https://duxryudlekdvmktreqfe.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1eHJ5dWRsZWtkdm1rdHJlcWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTY1NDgsImV4cCI6MjA5MDI3MjU0OH0.WCinXLC9obmkQlvMj5oDaH7Mvw-oWH0xTl2NRldE-4I';
const SUCCESS_IMG_KEY='__success_page_image__';

var DEFAULT_PASSWORD="admin123";
var currentTab="pending";
var currentView="review";
var imgData=null;
var cfg={title:"27研料库网盘活动",subTitle:"下方任务三选一即可",task1Title:"小红书评论区推荐",task1Desc:"在小红书笔记评论区中回答求资源的用户，每篇截图1张共3张",task2Title:"转发考研群推荐",task2Desc:"领取专属海报后发布在群里，然后提交截图两张",task3Title:"小红书发帖推荐",task3Desc:"发布笔记推荐研料库，浏览量达到50后截图一张"};
var aiKeywords={required:["研料库","小红书","评论","考研"],ban:["微信","QQ号","广告","二维码"]};

function init(){
var p=localStorage.getItem("adminPassword");
if(!p)localStorage.setItem("adminPassword",DEFAULT_PASSWORD);
loadCfg();
}
init();

function loadCfg(){
var c=localStorage.getItem("cfg");
if(c)cfg=JSON.parse(c);
var k=localStorage.getItem("aiKeywords");
if(k)aiKeywords=JSON.parse(k);
}

function toast(msg){
var t=document.getElementById("toast");
t.textContent=msg;
t.classList.add("show");
setTimeout(function(){t.classList.remove("show");},3000);
}

function modal(title,body){
document.getElementById("modalTitle").textContent=title;
document.getElementById("modalBody").innerHTML=body;
document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show");}
document.getElementById("modal").onclick=function(e){if(e.target===this)closeModal();};

function login(){
var pwd=document.getElementById("passwordInput").value;
var realPwd=localStorage.getItem("adminPassword")||DEFAULT_PASSWORD;
if(pwd===realPwd){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("adminPage").classList.remove("hidden");
loadData();
}else{
document.getElementById("loginError").style.display="block";
}
}

function logout(){
document.getElementById("loginPage").classList.remove("hidden");
document.getElementById("adminPage").classList.add("hidden");
document.getElementById("passwordInput").value="";
}

function switchView(view){
currentView=view;
document.getElementById("reviewView").classList.toggle("hidden",view!=="review");
document.getElementById("configView").classList.toggle("hidden",view!=="config");
document.getElementById("navReview").classList.toggle("active",view==="review");
document.getElementById("navConfig").classList.toggle("active",view==="config");
if(view==="config")loadEditor();
if(view==="review")loadData();
}

function loadEditor(){
document.getElementById("cfg_title").value=cfg.title;
document.getElementById("cfg_subtitle").value=cfg.subTitle;
document.getElementById("cfg_t1_title").value=cfg.task1Title;
document.getElementById("cfg_t1_desc").value=cfg.task1Desc;
document.getElementById("cfg_t2_title").value=cfg.task2Title;
document.getElementById("cfg_t2_desc").value=cfg.task2Desc;
document.getElementById("cfg_t3_title").value=cfg.task3Title;
document.getElementById("cfg_t3_desc").value=cfg.task3Desc;
document.getElementById("kw_required").value=aiKeywords.required.join("\n");
document.getElementById("kw_ban").value=aiKeywords.ban.join("\n");
loadCurrentImg();
}

function saveConfig(){
cfg.title=document.getElementById("cfg_title").value;
cfg.subTitle=document.getElementById("cfg_subtitle").value;
cfg.task1Title=document.getElementById("cfg_t1_title").value;
cfg.task1Desc=document.getElementById("cfg_t1_desc").value;
cfg.task2Title=document.getElementById("cfg_t2_title").value;
cfg.task2Desc=document.getElementById("cfg_t2_desc").value;
cfg.task3Title=document.getElementById("cfg_t3_title").value;
cfg.task3Desc=document.getElementById("cfg_t3_desc").value;
localStorage.setItem("cfg",JSON.stringify(cfg));
toast("配置已保存");
}

function saveKeywords(){
var req=document.getElementById("kw_required").value.split("\n").map(function(s){return s.trim()}).filter(function(s){return s});
var ban=document.getElementById("kw_ban").value.split("\n").map(function(s){return s.trim()}).filter(function(s){return s});
aiKeywords.required=req;
aiKeywords.ban=ban;
localStorage.setItem("aiKeywords",JSON.stringify(aiKeywords));
toast("关键词已保存");
}

function handleImg(file){
if(!file)return;
var reader=new FileReader();
reader.onload=function(e){
imgData=e.target.result;
document.getElementById("imgUrl").value="";
document.getElementById("imgPreview").innerHTML='<img src="'+imgData+'" alt="预览">';
document.getElementById("imgPreview").style.display="block";
};
reader.readAsDataURL(file);
}

async function loadCurrentImg(){
try{
// 使用特殊 task_name 查询成功页面图片
var res=await fetch(SUPABASE_URL+'/rest/v1/submissions?task_name=eq.'+encodeURIComponent(SUCCESS_IMG_KEY),{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
if(res.ok){
var data=await res.json();
if(data.length>0&&data[0].image){
document.getElementById("currentImg").innerHTML='<div style="color:#666;margin-bottom:5px;">当前审核通过页面图片：</div><img src="'+data[0].image+'" alt="当前">';
document.getElementById("currentImg").style.display="block";
}
}
}catch(e){console.log('loadCurrentImg error:',e);}
}

async function saveImg(){
var url=document.getElementById("imgUrl").value.trim();
var toSave=imgData||url;
if(!toSave){toast("请上传图片或输入URL");return;}

try{
// 先查找是否已有成功页面图片记录
var checkRes=await fetch(SUPABASE_URL+'/rest/v1/submissions?task_name=eq.'+encodeURIComponent(SUCCESS_IMG_KEY),{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
var existing=await checkRes.json();

if(existing.length>0){
// 更新已有记录
var updateRes=await fetch(SUPABASE_URL+'/rest/v1/submissions?id=eq.'+existing[0].id,{
method:'PATCH',
headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
body:JSON.stringify({image:toSave})
});
if(updateRes.ok){
localStorage.setItem("successPageImg",toSave);
toast("图片已更新！");
loadCurrentImg();
document.getElementById("imgPreview").style.display="none";
imgData=null;
}else{
toast("更新失败");
}
}else{
// 创建新记录
var createRes=await fetch(SUPABASE_URL+'/rest/v1/submissions',{
method:'POST',
headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
body:JSON.stringify({
task_type:99,
task_name:SUCCESS_IMG_KEY,
image:toSave,
status:'passed'
})
});
if(createRes.ok){
localStorage.setItem("successPageImg",toSave);
toast("图片已保存！");
loadCurrentImg();
document.getElementById("imgPreview").style.display="none";
imgData=null;
}else{
toast("保存失败");
}
}
}catch(e){toast("错误："+e.message);}
}

async function clearImg(){
if(!confirm("确定清除图片吗？"))return;
try{
var checkRes=await fetch(SUPABASE_URL+'/rest/v1/submissions?task_name=eq.'+encodeURIComponent(SUCCESS_IMG_KEY),{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
var existing=await checkRes.json();
if(existing.length>0){
await fetch(SUPABASE_URL+'/rest/v1/submissions?id=eq.'+existing[0].id,{
method:'DELETE',
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
}
localStorage.removeItem("successPageImg");
document.getElementById("imgUrl").value="";
document.getElementById("imgPreview").style.display="none";
document.getElementById("currentImg").style.display="none";
imgData=null;
toast("已清除");
}catch(e){toast("错误："+e.message);}
}

async function getSubmissions(){
try{
var res=await fetch(SUPABASE_URL+'/rest/v1/submissions?order=created_at.desc',{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
if(res.ok){
document.getElementById("syncStatus").textContent="☁️ 已连接云端";
return await res.json();
}
document.getElementById("syncStatus").textContent="⚠️ 连接失败";
return[];
}catch(e){
document.getElementById("syncStatus").textContent="⚠️ 云端连接失败";
return[];
}
}

async function updateStatus(id,status){
try{
var res=await fetch(SUPABASE_URL+'/rest/v1/submissions?id=eq.'+id,{
method:'PATCH',
headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'},
body:JSON.stringify({status:status})
});
return res.ok;
}catch(e){return false;}
}

async function loadData(){await renderAdmin();}

async function renderAdmin(){
var subs=await getSubmissions();
// 过滤掉成功页面图片记录
subs=subs.filter(function(s){return s.task_name!==SUCCESS_IMG_KEY});
var stats={pending:subs.filter(function(x){return x.status==='pending'}).length,passed:subs.filter(function(x){return x.status==='passed'}).length,rejected:subs.filter(function(x){return x.status==='rejected'}).length};
document.getElementById("statPending").textContent=stats.pending;
document.getElementById("statPassed").textContent=stats.passed;
document.getElementById("statRejected").textContent=stats.rejected;
document.getElementById("tabPending").textContent="待审核 ("+stats.pending+")";
renderList(subs);
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
event.target.classList.add("active");
getSubmissions().then(renderList);
}

function renderList(subs){
subs=subs.filter(function(s){return s.status===currentTab});
var list=document.getElementById("reviewList");
if(subs.length===0){
var msgs={pending:"暂无待审核的提交",passed:"暂无已通过的记录",rejected:"暂无已拒绝的记录"};
list.innerHTML='<div style="text-align:center;color:#999;padding:40px;">'+msgs[currentTab]+'</div>';
return;
}
var html="";
for(var i=0;i<subs.length;i++){
var sub=subs[i];
var time=sub.created_at?new Date(sub.created_at).toLocaleString():'未知';
html+='<div class="review-item">';
html+='<div class="review-header"><span style="font-weight:700;">'+sub.task_name+'</span><span style="font-size:12px;color:#999;">'+time+'</span></div>';
html+='<img src="'+sub.image+'" class="review-image" onclick="showImg(this.src)">';
if(sub.status==='pending'){
html+='<div class="review-actions">';
html+='<button class="btn btn-green" onclick="review('+sub.id+',\'passed\')" style="flex:1;padding:10px;">✅ 通过</button>';
html+='<button class="btn btn-red" onclick="review('+sub.id+',\'rejected\')" style="flex:1;padding:10px;">❌ 拒绝</button>';
html+='</div>';
}else{
html+='<div style="margin-top:10px;font-size:13px;color:'+(sub.status==='passed'?"#28a745":"#dc3545")+';">审核结果：<strong>'+(sub.status==='passed'?"已通过":"已拒绝")+'</strong></div>';
}
html+='</div>';
}
list.innerHTML=html;
}

async function review(id,st){
if(!confirm((st==='passed'?"通过":"拒绝")+"吗？"))return;
var ok=await updateStatus(id,st);
if(ok){toast("已处理");loadData();}else{toast("保存失败");}
}

function showImg(src){
modal("截图预览",'<img src="'+src+'" style="max-width:100%;border-radius:8px;"><button class="btn btn-gray" onclick="closeModal()" style="margin-top:15px;">关闭</button>');
}
</script>
</body>
</html>
