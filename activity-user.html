<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,#f5f3ff 0%,#ede9fe 100%);min-height:100vh;padding:15px 10px 80px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;padding:15px 0}
.header h1{color:#b91c1c;font-size:22px;font-weight:800}
.header p{color:#250ea7;font-size:16px;margin-top:5px}
.card{background:#fff;border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 8px 24px rgba(124,58,237,0.08);border:1px solid rgba(139,92,246,0.15)}
.card-title{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
.card-desc{color:#666;line-height:1.7;margin-bottom:16px;font-size:14px;background:#f5f3ff;padding:14px;border-radius:10px;border-left:3px solid #8b5cf6}
.btn{display:block;width:100%;padding:12px 20px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;text-align:center;margin-top:10px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(234,88,12,0.3)}
.btn-green{background:linear-gradient(135deg,#28a745,#1e7e34)}
.btn-gray{background:#6b7280}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-left:8px}
.badge-ai{background:#fef3c7;color:#d97706}
.badge-human{background:#dbeafe;color:#2563eb}
.status-box{text-align:center;padding:30px 20px;background:#fff;border-radius:18px;box-shadow:0 8px 24px rgba(124,58,237,0.08)}
.status-icon{font-size:56px;margin:20px 0}
.status-text{font-size:22px;font-weight:700;color:#b91c1c;margin:15px 0}
.status-text.green{color:#10b981}
.tips{color:#5b21b6;font-size:13px;line-height:1.7;background:#fff;padding:14px;border-radius:10px;border:1px solid #ddd6fe;margin:15px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9998;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;max-width:90%;max-height:85vh;overflow-y:auto;width:340px}
.modal-title{font-size:18px;font-weight:700;color:#333;margin-bottom:15px;text-align:center}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:15px 30px;border-radius:10px;z-index:10000;font-size:14px;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}

.upload-area:hover{border-color:#8b5cf6;background:#f5f3ff}

.auto-check{background:#fef3c7;border:1px solid #f59e0b;color:#92400e;padding:15px;border-radius:10px;font-size:14px;margin:10px 0;}
.dot{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.progress-bar{width:100%;height:8px;background:#e5e7eb;border-radius:4px;margin:15px 0;overflow:hidden}

if(ocrWorker)return;
try{
ocrWorker=await Tesseract.createWorker('chi_sim',1,{

if(res.ok){
var data=await res.json();
if(data.length>0&&data[0].image){

}
}

async function checkMyStatus(){
try{
var res=await fetch(SUPABASE_URL+'/rest/v1/submissions?order=created_at.desc&limit=50',{
headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
});
if(res.ok){
var subs=await res.json();
subs=subs.filter(function(s){
return s.task_name!==SUCCESS_IMG_KEY&&s.task_name!==CONFIG_KEY&&s.task_name!==KEYWORDS_KEY;
});
var reviewed=subs.filter(function(s){return s.status&&s.status!=='pending'});
if(reviewed.length>0){
var latest=reviewed[0];
if(latest.status==='passed'){
status="success";
stopAutoCheck();
await render();
return true;
}else if(latest.status==='rejected'){
stopAutoCheck();
await render();
modal("审核未通过","<div style='text-align:center;'><div style='font-size:48px;'>😢</div><div style='margin:15px 0;'>很遗憾，您的审核未通过<br>可以返回重新提交</div><button class='btn btn-gray' onclick='closeModal()' style='margin-top:10px;'>返回首页</button></div>");
return true;
}
}
}
}catch(e){}
return false;
}

function startAutoCheck(){
stopAutoCheck();
toast("已开启自动检查...");
checkInterval=setInterval(async function(){
var found=await checkMyStatus();
if(found)stopAutoCheck();
},2000);
}

function stopAutoCheck(){
if(checkInterval){clearInterval(checkInterval);checkInterval=null;}
}

async function render(){

}
html+='<button class="btn btn-gray" onclick="status=\'tasks\';render();" style="margin-top:20px;">返回首页</button>';
html+='</div>';
el.innerHTML=html;
}
else if(status==="submitted"){el.innerHTML=renderSubmitted();}
else{el.innerHTML=renderTasks();stopAutoCheck();}
}

return'<div class="header"><h1>'+cfg.title+'</h1><p>'+cfg.subTitle+'</p></div>'+
'<div class="card"><div class="card-title">1️⃣ '+cfg.task1Title+'<span class="badge badge-ai">AI审核</span></div><div class="card-desc">'+cfg.task1Desc+'</div><button class="btn" onclick="startTask(1)">📤 上传任务截图</button></div>'+
'<div class="card"><div class="card-title">2️⃣ '+cfg.task2Title+'<span class="badge badge-human">人工审核</span></div><div class="card-desc">'+cfg.task2Desc+'</div><button class="btn" onclick="startTask(2)">📋 领取海报/上传截图</button></div>'+
'<div class="card"><div class="card-title">3️⃣ '+cfg.task3Title+'<span class="badge badge-human">人工审核</span></div><div class="card-desc">'+cfg.task3Desc+'</div><button class="btn" onclick="startTask(3)">📤 上传任务截图</button></div>';
}

html+='<div class="auto-check">🔔 请保持此页面开启<br>审核通过后会<span style="color:#dc3545;font-weight:700;">自动跳转到成功页面</span></div>';

function startTask(type){
selectedTask=type;
var names={1:cfg.task1Title,2:cfg.task2Title,3:cfg.task3Title};
var auditLabel=type===1?'<span class="badge badge-ai">AI审核</span>':'<span class="badge badge-human">人工审核</span>';

kwHtml='<div style="background:#f8f9fa;padding:10px;border-radius:8px;margin:10px 0;font-size:12px;"><strong>必须包含：</strong>';
for(var i=0;i<aiKeywords.required.length;i++){kwHtml+='<span class="keyword-tag">'+aiKeywords.required[i]+'</span> ';}
kwHtml+='<br><strong style="color:#dc3545;">敏感词：</strong>';
for(var i=0;i<aiKeywords.ban.length;i++){kwHtml+='<span class="keyword-tag red">'+aiKeywords.ban[i]+'</span> ';}
kwHtml+='</div>';
}
var task2Html='';
if(type===2){
task2Html='<div id="task2RefImg" style="text-align:center;margin:10px 0;"><div style="color:#666;margin-bottom:5px;">任务二参考图片</div><div style="color:#999;">加载中...</div></div>';
}
var body='<p style="text-align:center;color:#666;margin-bottom:10px;">'+names[type]+' '+auditLabel+'</p>'+kwHtml+task2Html+
'<div class="upload-area" onclick="document.getElementById(\'fileInput\').click()"><div style="font-size:32px;">📷</div><div style="color:#666;margin-top:10px;">点击上传图片</div><div id="preview"></div></div>'+
'<input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])">'+
'<button class="btn" id="submitBtn" onclick="submitTask()" disabled>📤 提交审核</button>'+
'<button class="btn" onclick="closeModal()" style="background:#6b7280;margin-top:10px;">取消</button>';

}else if(el){
el.innerHTML='<div style="color:#999;">暂无参考图片</div>';
}
}

}

function handleFile(file){
if(!file)return;
selectedFile=file;
var reader=new FileReader();
reader.onload=function(e){
document.getElementById("preview").innerHTML='<img src="'+e.target.result+'" style="max-width:100%;border-radius:8px;margin-top:10px;">';
document.getElementById("submitBtn").disabled=false;
};
reader.readAsDataURL(file);
}

function escapeHtml(str){
return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');
}

async function doAIReview(imageData){
try{
// 图像预处理（提高清晰度）
var canvas=document.createElement('canvas');
var ctx=canvas.getContext('2d');
var img=new Image();
await new Promise(function(resolve,reject){
img.onload=resolve;
img.onerror=reject;
img.src=imageData;
});
canvas.width=img.width*2;
canvas.height=img.height*2;
ctx.imageSmoothingEnabled=true;
ctx.drawImage(img,0,0,canvas.width,canvas.height);
// 增强对比度
var imageData2=ctx.getImageData(0,0,canvas.width,canvas.height);
var data=imageData2.data;
for(var i=0;i<data.length;i+=4){
var avg=(data[i]+data[i+1]+data[i+2])/3;
var contrast=1.5;
var newVal=((avg-128)*contrast)+128;
newVal=Math.max(0,Math.min(255,newVal));
data[i]=data[i+1]=data[i+2]=newVal;
}
ctx.putImageData(imageData2,0,0);
var processedImage=canvas.toDataURL();
// 使用预加载的 worker 或快速创建新的
var worker=ocrWorker;
if(!worker){
worker=await Tesseract.createWorker('chi_sim',1,{
logger:function(m){
if(m.status==='recognizing text'){
var progressEl=document.getElementById('ocrProgress');
if(progressEl){
progressEl.style.width=(m.progress*100)+'%';
}
}
}
});
}
// 识别处理后的图片
var result;
if(ocrWorker&&worker===ocrWorker){
result=await worker.recognize(processedImage);
}else{
result=await worker.recognize(processedImage);
worker.terminate();
}
var text=result.data.text;
// 标准化文字（移除空格和特殊字符）
var normalizedText=text.replace(/\s+/g,'');
// 分析 - 使用宽松匹配
var matched=[],missing=[],banned=[];
for(var i=0;i<aiKeywords.required.length;i++){
var keyword=aiKeywords.required[i];
// 检查关键词中的每个字是否都存在（宽松匹配）
var allCharsFound=true;
for(var j=0;j<keyword.length;j++){
if(normalizedText.indexOf(keyword.charAt(j))<0){
allCharsFound=false;
break;
}
}
if(allCharsFound||normalizedText.indexOf(keyword)>=0){
matched.push(keyword+' ✓');
}else{
missing.push(keyword);
}
}
for(var i=0;i<aiKeywords.ban.length;i++){
if(normalizedText.indexOf(aiKeywords.ban[i])>=0){banned.push(aiKeywords.ban[i]);}
}
// 只要敏感词没匹配就通过
return{text:text,matched:matched,missing:missing,banned:banned,pass:banned.length===0};
}catch(e){
return{pass:false,error:e.message};
}
}

async function submitTask(){
if(!selectedFile){toast("请先上传图片");return;}
var imageData=await new Promise(function(resolve){
var reader=new FileReader();
reader.onload=function(e){resolve(e.target.result);};
reader.readAsDataURL(selectedFile);
});
closeModal();
if(selectedTask===1){
// AI 审核
modal("AI审核中","<div style='text-align:center;padding:30px;'><div style='font-size:48px;'>🤖</div><div style='margin-top:15px;'>正在识别图片...</div><div class='progress-bar' style='margin-top:15px;'><div class='progress-fill' id='ocrProgress' style='width:0%'></div></div><div style='font-size:12px;color:#999;margin-top:10px;'>预计 3-5 秒</div></div>");
var result=await doAIReview(imageData);
closeModal();
if(result.error){
modal("审核错误","<div style='text-align:center;'><div style='font-size:48px;'>⚠️</div><div style='margin:15px 0;'>"+result.error+"</div><button class='btn btn-gray' onclick='closeModal()'>关闭</button></div>");
}
else if(result.pass){
status="success";
await render();
}
else{
// 显示识别结果调试信息
var debugHtml="<div style='text-align:center;'><div style='font-size:48px;'>❌</div><div style='font-weight:700;margin:10px 0;'>审核未通过</div>";
debugHtml+="<div style='background:#f5f5f5;padding:10px;border-radius:8px;margin:10px 0;text-align:left;font-size:11px;word-break:break-all;'><strong>识别出的文字（原始）：</strong><br>"+escapeHtml((result.text||'').substring(0,300))+"</div>";
debugHtml+="<div style='background:#e8f5e9;padding:10px;border-radius:8px;margin:10px 0;text-align:left;font-size:11px;word-break:break-all;'><strong>标准化后：</strong><br>"+escapeHtml(result.text.replace(/\s+/g,'').substring(0,300))+"</div>";
debugHtml+="<div style='text-align:left;font-size:12px;margin:10px 0;'><strong>需要匹配：</strong>"+aiKeywords.required.join(', ')+"</div>";
if(result.matched.length>0)debugHtml+="<div style='color:#28a745;margin:5px 0;'>✅ 已匹配: "+result.matched.join(", ")+"</div>";
if(result.missing.length>0)debugHtml+="<div style='color:#dc3545;margin:5px 0;'>❌ 未匹配: "+result.missing.join(", ")+"</div>";
if(result.banned.length>0)debugHtml+="<div style='color:#dc3545;margin:5px 0;'>⚠️ 敏感词: "+result.banned.join(", ")+"</div>";
debugHtml+="<button class='btn btn-gray' onclick='closeModal()' style='margin-top:15px;'>关闭</button></div>";
modal("AI审核结果",debugHtml);
}
}else{
// 人工审核
var sub={taskType:selectedTask,taskName:{1:cfg.task1Title,2:cfg.task2Title,3:cfg.task3Title}[selectedTask],image:imageData};
var ok=await saveToCloud(sub);
if(ok){status="submitted";render();startAutoCheck();toast("提交成功！审核通过后自动跳转！");}
else{toast("提交失败，请重试");}
}
}

async function manualCheck(){
toast("正在检查...");
var found=await checkMyStatus();
if(!found){toast("还在审核中，请耐心等待...");}
}

window.onbeforeunload=function(){stopAutoCheck();};

loadCloudData();
</script>
</body>
</html>
